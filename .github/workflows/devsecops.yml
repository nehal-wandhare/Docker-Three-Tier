name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:

  # 🔹 BUILD JOB
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Images
      run: docker compose build

    - name: List Docker Images
      run: docker images


  # 🔹 SNYK JOB
  snyk:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Images
      run: docker compose build

    - name: Install Snyk
      run: npm install -g snyk

    - name: Snyk Container Scan
      run: |
        snyk auth ${{ secrets.SNYK_TOKEN }}
        snyk container test nehalwandhare/backend:latest \
        --severity-threshold=high || true


  # 🔹 TRIVY JOB
  trivy:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Images
      run: docker compose build

    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget apt-transport-https gnupg lsb-release

        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list

        sudo apt-get update
        sudo apt-get install -y trivy

    - name: Trivy Scan
      run: |
        trivy image nehalwandhare/backend:latest \
        --severity HIGH,CRITICAL || true


  # 🔹 SAST JOB (SonarCloud)
  sonar:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v2
      with:
        args: >
          -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
          -Dsonar.organization=${{ secrets.SONAR_ORG }}
          -Dsonar.sources=.
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


  # 🔥 DAST JOB (OWASP ZAP)
  zap:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Images
      run: docker compose build

    - name: Run Application
      run: docker compose up -d

    - name: Wait for Application
      run: sleep 40

    - name: Check App Health
      run: curl -I http://localhost:8080/student || true

    - name: OWASP ZAP Scan
      run: |
       docker run --network="host" -v $(pwd):/zap/wrk/:rw \
       ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
       -t http://localhost:8080/student \
       -r zap-report.html || true
