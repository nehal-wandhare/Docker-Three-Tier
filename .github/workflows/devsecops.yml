name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Docker Images
      run: docker compose build

    - name: Install Snyk
      run: npm install -g snyk

    - name: Snyk Scan
      run: |
        snyk auth ${{ secrets.SNYK_TOKEN }}
        snyk test