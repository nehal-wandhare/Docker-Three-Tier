name: DevSecOps Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  devsecops:
    runs-on: ubuntu-latest

    steps:

    # 🔹 1. Checkout Code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 🔹 2. Setup Java
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 🔹 3. Build & Test with Coverage (JaCoCo)
    - name: Build & Test with Coverage
      run: |
        cd Backend
        mvn clean verify

    # 🔹 4. Verify Coverage File
    - name: Check Coverage Files
      run: |
        echo "Checking jacoco folder..."
        ls Backend/target/site/jacoco || echo "jacoco folder not found"

    # 🔹 5. Build Docker Images
    - name: Build Images
      run: docker compose build

    # 🔹 6. Install Snyk
    - name: Install Snyk
      run: npm install -g snyk

    # 🔹 7. Snyk Scan
    - name: Snyk Scan
      run: |
        snyk auth ${{ secrets.SNYK_TOKEN }}
        snyk container test nehalwandhare/backend:latest \
        --severity-threshold=high || true

    # 🔹 8. Install Trivy
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget apt-transport-https gnupg lsb-release

        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list

        sudo apt-get update
        sudo apt-get install -y trivy

    # 🔹 9. Trivy Scan
    - name: Trivy Scan
      run: |
        trivy image nehalwandhare/backend:latest \
        --severity HIGH,CRITICAL || true

    # 🔹 10. SonarCloud Scan (FIXED FOR COVERAGE)
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v2
      with:
       args: >
        -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
        -Dsonar.organization=${{ secrets.SONAR_ORG }}
        -Dsonar.sources=Backend/src
        -Dsonar.exclusions=Frontend/**,Database/**,**/Dockerfile
        -Dsonar.java.binaries=Backend/target/classes
        -Dsonar.coverage.jacoco.xmlReportPaths=Backend/target/site/jacoco/jacoco.xml
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    # 🔹 11. Run Application
    - name: Run Application
      run: docker compose up -d

    # 🔹 12. Wait for App
    - name: Wait for App
      run: sleep 40

    # 🔹 13. Check App Health
    - name: Check App
      run: curl -I http://localhost:8080/student || true

    # 🔹 14. OWASP ZAP Scan
    - name: OWASP ZAP Scan
      run: |
        docker run --network="host" -v $(pwd):/zap/wrk/:rw \
        ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
        -t http://localhost:8080/student \
        -r zap-report.html || true

    # 🔹 15. Upload ZAP Report
    - name: Upload ZAP Report
      uses: actions/upload-artifact@v4
      with:
        name: zap-report
        path: zap-report.html
